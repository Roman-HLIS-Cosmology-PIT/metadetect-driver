channels:
  - conda-forge
dependencies:
  - asdf
  - astropy
  - dustmaps
  - healpy
  - healsparse
  - galsim
  - metadetect
  - ngmix
  - numpy
  - pip
  - pyarrow
  - python
  - scipy
  - scikit-learn
  - setuptools < 82  # metadetect uses pkg_resources which was deprecated in 82 (https://setuptools.pypa.io/en/latest/history.html#v82-0-0)
  - sep
  - pip:
      - detection @ git+https://github.com/Roman-HLIS-Cosmology-PIT/detection.git
      - pyimcom @ git+https://github.com/Roman-HLIS-Cosmology-PIT/pyimcom.git