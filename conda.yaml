name: metadetect-driver
channels:
  - conda-forge
dependencies:
  - asdf
  - astropy
  - galsim
  - metadetect
  - ngmix
  - numpy
  - pyarrow
  - scipy
  - setuptools < 82  # metadetect uses pkg_resources which was deprecated in 82 (https://setuptools.pypa.io/en/latest/history.html#v82-0-0)
  - sep
  - pip:
      - pyimcom @ git+https://github.com/Roman-HLIS-Cosmology-PIT/pyimcom.git@main
